<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粒子与饰品对比方案</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05070a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #header {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    h1 { font-size: 14px; font-weight: 500; opacity: 0.9; }
    .desc { font-size: 12px; opacity: 0.5; }
    #grids {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      padding: 4px;
      min-height: 0;
    }
    .cell {
      position: relative;
      background: #020305;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
      min-width: 0;
    }
    .cell canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .cell-label {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .cell-note {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      font-size: 10px;
      opacity: 0.6;
      line-height: 1.4;
      pointer-events: none;
    }
    .selected {
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0,255,136,0.15);
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="header">
      <h1>粒子与饰品可见性对比方案</h1>
      <span class="desc">移动鼠标查看悬停/选中效果 | 点击选择方案</span>
    </div>
    <div id="grids">
      <div class="cell" data-scheme="0">
        <div class="cell-label">方案 A：原版</div>
        <div class="cell-note">当前项目效果。粒子较亮，饰品半透明，靠呼吸动画吸引注意。</div>
      </div>
      <div class="cell" data-scheme="1">
        <div class="cell-label">方案 B：暗粒子 + 亮饰品</div>
        <div class="cell-note">粒子 alpha 和核心亮度降低，饰品加自发光和白色描边。</div>
      </div>
      <div class="cell" data-scheme="2">
        <div class="cell-label">方案 C：暗角遮罩</div>
        <div class="cell-note">每个饰品背后加深色圆盘，像聚光灯把周围粒子压暗。</div>
      </div>
      <div class="cell" data-scheme="3">
        <div class="cell-label">方案 D：粒子让出空间</div>
        <div class="cell-note">靠近饰品时粒子被强力推开，留出干净的圆形区域。</div>
      </div>
      <div class="cell" data-scheme="4">
        <div class="cell-label">方案 E：全部叠加</div>
        <div class="cell-note">暗粒子 + 亮饰品 + 暗角遮罩 + 粒子排斥，效果最强。</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const PARTICLE_COUNT = 6000;
    const ORNAMENT_COUNT = 5;

    // 粒子颜色（蓝紫渐变）
    const PARTICLE_COLOR_1 = new THREE.Color(0x4488ff);
    const PARTICLE_COLOR_2 = new THREE.Color(0xaa66ff);

    // 饰品位置（围绕中心分布）
    const ORNAMENT_POSITIONS = [
      new THREE.Vector3(-1.2, 0.8, 0),
      new THREE.Vector3(1.2, 0.6, 0),
      new THREE.Vector3(-0.8, -0.9, 0),
      new THREE.Vector3(0.9, -0.7, 0),
      new THREE.Vector3(0, 0, 0),
    ];
    const ORNAMENT_COLORS = [0x00ff88, 0x4488ff, 0xffcc00, 0xff6666, 0xaa66ff];
    const ORNAMENT_ICONS = ['VS', '♫', '⚙', '🌐', '📝'];

    const scenes = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const schemes = [
      { name: '原版', particleAlpha: 0.9, particleCore: 0.8, particleHalo: 0.4, glow: 0.6, ring: false, mask: false, repel: 0.0, iconOutline: false, ornamentEmissive: 0.3 },
      { name: '暗粒子+亮饰品', particleAlpha: 0.45, particleCore: 0.4, particleHalo: 0.25, glow: 0.4, ring: true, mask: false, repel: 0.0, iconOutline: true, ornamentEmissive: 0.8 },
      { name: '暗角遮罩', particleAlpha: 0.9, particleCore: 0.8, particleHalo: 0.4, glow: 0.6, ring: false, mask: true, repel: 0.0, iconOutline: false, ornamentEmissive: 0.3 },
      { name: '粒子让出空间', particleAlpha: 0.9, particleCore: 0.8, particleHalo: 0.4, glow: 0.6, ring: false, mask: false, repel: 2.5, iconOutline: false, ornamentEmissive: 0.3 },
      { name: '全部叠加', particleAlpha: 0.45, particleCore: 0.4, particleHalo: 0.25, glow: 0.4, ring: true, mask: true, repel: 2.5, iconOutline: true, ornamentEmissive: 0.8 },
    ];

    const vertexShader = /* glsl */ `
      attribute vec3 basePos;
      attribute float phase;
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uTime;
      uniform vec2 uMousePos;
      uniform float uRepel;
      uniform float uGlobalAlpha;
      
      // 简单噪声
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
      float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
                  i.z + vec4(0.0, i1.z, i2.z, 1.0))
                + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }
      
      void main() {
        vec3 pos = basePos;
        
        // 缓慢噪声漂移
        float n = snoise(pos * 0.8 + uTime * 0.15);
        pos += vec3(
          snoise(pos * 0.5 + uTime * 0.1),
          snoise(pos * 0.5 + uTime * 0.1 + 100.0),
          snoise(pos * 0.5 + uTime * 0.1 + 200.0)
        ) * 0.08;
        
        // 呼吸
        pos.y += sin(uTime * 1.2 + phase) * 0.04;
        
        // 鼠标/目标排斥
        vec2 toMouse = pos.xy - uMousePos;
        float dist = length(toMouse);
        float falloff = exp(-dist * dist * 0.5);
        pos.xy += normalize(toMouse + 0.001) * uRepel * falloff;
        
        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = size * (300.0 / -mv.z);
        
        vColor = color;
        vAlpha = uGlobalAlpha;
      }
    `;

    const fragmentShader = /* glsl */ `
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uCore;
      uniform float uHalo;
      uniform float uGlow;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        if (d > 0.5) discard;
        
        float halo = exp(-d * 1.8) * uHalo;
        float ring = (smoothstep(0.45, 0.35, d) - smoothstep(0.35, 0.2, d)) * uGlow;
        float core = exp(-d * 6.0) * uCore;
        
        float alpha = (halo + ring + core) * vAlpha;
        vec3 col = vColor * (halo + ring * 0.7) + mix(vColor, vec3(1.0), 0.35) * core;
        
        gl_FragColor = vec4(col, alpha);
      }
    `;

    function createIconTexture(icon) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 128, 128);
      ctx.font = 'bold 70px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(icon, 64, 68);
      const tex = new THREE.CanvasTexture(canvas);
      return tex;
    }

    function createScene(cell, scheme, index) {
      const width = cell.clientWidth;
      const height = cell.clientHeight;
      const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 100);
      camera.position.z = 4;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      cell.appendChild(renderer.domElement);

      const scene = new THREE.Scene();

      // 粒子
      const geometry = new THREE.BufferGeometry();
      const positions = [];
      const colors = [];
      const phases = [];
      const sizes = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const r = 0.5 + Math.random() * 1.8;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta) * 0.6;
        const z = r * Math.cos(phi) * 0.3;
        positions.push(x, y, z);
        const t = Math.random();
        const c = PARTICLE_COLOR_1.clone().lerp(PARTICLE_COLOR_2, t);
        colors.push(c.r, c.g, c.b);
        phases.push(Math.random() * Math.PI * 2);
        sizes.push(1.5 + Math.random() * 2.5);
      }
      geometry.setAttribute('basePos', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geometry.setAttribute('phase', new THREE.Float32BufferAttribute(phases, 1));
      geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
      geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(PARTICLE_COUNT * 3), 3));

      const material = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uMousePos: { value: new THREE.Vector2(100, 100) },
          uRepel: { value: scheme.repel },
          uGlobalAlpha: { value: scheme.particleAlpha },
          uCore: { value: scheme.particleCore },
          uHalo: { value: scheme.particleHalo },
          uGlow: { value: scheme.glow }
        },
        vertexShader,
        fragmentShader,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      // 饰品
      const ornaments = [];
      for (let i = 0; i < ORNAMENT_COUNT; i++) {
        const group = new THREE.Group();
        group.position.copy(ORNAMENT_POSITIONS[i]);

        // 气泡
        const bubbleGeo = new THREE.SphereGeometry(0.28, 32, 32);
        const bubbleMat = new THREE.MeshPhysicalMaterial({
          color: ORNAMENT_COLORS[i],
          transparent: true,
          opacity: 0.22,
          emissive: ORNAMENT_COLORS[i],
          emissiveIntensity: scheme.ornamentEmissive,
          roughness: 0.2,
          metalness: 0.1,
          clearcoat: 0.8,
          transmission: 0.3,
          thickness: 0.5
        });
        const bubble = new THREE.Mesh(bubbleGeo, bubbleMat);
        group.add(bubble);

        // 外环（方案 B/E 显示白色强光环）
        if (scheme.ring) {
          const ringGeo = new THREE.RingGeometry(0.32, 0.34, 64);
          const ringMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide
          });
          const ring = new THREE.Mesh(ringGeo, ringMat);
          group.add(ring);
          group.userData.ring = ring;
        }

        // 暗角遮罩
        if (scheme.mask) {
          const maskGeo = new THREE.CircleGeometry(0.7, 64);
          const maskMat = new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.55,
            side: THREE.DoubleSide
          });
          const mask = new THREE.Mesh(maskGeo, maskMat);
          mask.position.z = -0.05;
          mask.renderOrder = -1;
          group.add(mask);
        }

        // 图标
        const spriteMat = new THREE.SpriteMaterial({
          map: createIconTexture(ORNAMENT_ICONS[i]),
          transparent: true,
          opacity: 0.95
        });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(0.35, 0.35, 1);
        group.add(sprite);

        scene.add(group);
        ornaments.push({ group, bubble, bubbleMat, ring: group.userData.ring, baseScale: 1, hovered: false });
      }

      scenes.push({ renderer, scene, camera, material, ornaments, scheme, index, points });

      // 鼠标交互
      renderer.domElement.addEventListener('mousemove', (e) => {
        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        mouse.set(x, y);
        raycaster.setFromCamera(mouse, camera);
        const world = new THREE.Vector3();
        raycaster.ray.at(4, world);
        material.uniforms.uMousePos.value.set(world.x, world.y);

        // 检测饰品悬停
        ornaments.forEach(o => {
          const dist = raycaster.ray.distanceToPoint(o.group.position);
          const hovered = dist < 0.5;
          if (hovered && !o.hovered) {
            o.hovered = true;
            o.bubbleMat.emissiveIntensity = Math.max(scheme.ornamentEmissive, 1.2);
            o.bubble.scale.setScalar(1.35);
            if (o.ring) {
              o.ring.material.opacity = 1.0;
              o.ring.scale.setScalar(1.4);
            }
          } else if (!hovered && o.hovered) {
            o.hovered = false;
            o.bubbleMat.emissiveIntensity = scheme.ornamentEmissive;
            o.bubble.scale.setScalar(1.0);
            if (o.ring) {
              o.ring.material.opacity = 0.9;
              o.ring.scale.setScalar(1.0);
            }
          }
        });
      });

      // 点击选择方案
      renderer.domElement.addEventListener('click', () => {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
        cell.classList.add('selected');
      });
    }

    function init() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => createScene(cell, schemes[i], i));
      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now() * 0.001;
      scenes.forEach(s => {
        s.material.uniforms.uTime.value = time;
        s.ornaments.forEach(o => {
          o.group.rotation.z += 0.005;
          if (o.ring) {
            o.ring.rotation.z -= 0.01;
            if (!o.hovered) o.ring.scale.setScalar(1.0 + Math.sin(time * 3) * 0.1);
          }
        });
        s.renderer.render(s.scene, s.camera);
      });
    }

    window.addEventListener('resize', () => {
      scenes.forEach(s => {
        const cell = s.renderer.domElement.parentElement;
        const w = cell.clientWidth;
        const h = cell.clientHeight;
        s.camera.aspect = w / h;
        s.camera.updateProjectionMatrix();
        s.renderer.setSize(w, h);
      });
    });

    init();
  </script>
</body>
</html>
